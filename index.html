<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 Вумбыч Probability Radar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 1000px; width: 100%; }
        h1 { color: #38bdf8; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); position: relative; }
        .city-name { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; color: #e2e8f0; display: flex; justify-content: space-between; }
        .icao { font-size: 0.7em; color: #64748b; }
        .temp-row { display: flex; align-items: baseline; gap: 10px; margin: 10px 0; }
        .temp-live { font-size: 2.8em; font-weight: bold; color: #38bdf8; }
        .next-target { font-size: 1em; color: #94a3b8; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; border-top: 1px solid #334155; pt: 10px; padding-top: 10px; }
        .prob-box { text-align: center; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .prob-high { background-color: #064e3b; color: #34d399; border: 1px solid #059669; }
        .prob-mid { background-color: #451a03; color: #fbbf24; border: 1px solid #b45309; }
        .prob-low { background-color: #450a0a; color: #f87171; border: 1px solid #991b1b; }
        .prob-boil { background-color: #7f1d1d; color: #fef2f2; border: 1px solid #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .trend-up { color: #10b981; }
        .trend-down { color: #f43f5e; }
        .updated { font-size: 0.75em; color: #64748b; text-align: right; margin-top: 10px; }
    </style>
    <script>
        async function updateRadar() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                const grid = document.getElementById('radar-grid');
                grid.innerHTML = '';

                // Сортируем: сначала высокие вероятности
                const sorted = Object.entries(data).sort((a, b) => (b[1].probability || 0) - (a[1].probability || 0));

                for (const [id, info] of sorted) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const prob = info.probability || 0;
                    let probClass = 'prob-low';
                    let probText = 'LOW CHANCE';
                    if (prob > 45) { probClass = 'prob-mid'; probText = 'MID CHANCE'; }
                    if (prob > 75) { probClass = 'prob-high'; probText = 'HIGH CHANCE'; }
                    if (prob >= 90) { probClass = 'prob-boil'; probText = '🔥 BOIL / HIT'; }

                    card.innerHTML = `
                        <div class="city-name">${info.name} <span class="icao">${info.code}</span></div>
                        <div class="temp-row">
                            <span class="temp-live">${info.current}°${info.unit}</span>
                            <span class="next-target">→ Target ${info.max_today + 1}°${info.unit}</span>
                        </div>
                        <div class="stats-grid">
                            <div>Trend: <span class="${info.trend >= 0 ? 'trend-up' : 'trend-down'}">${info.trend >= 0 ? '+' : ''}${info.trend}°/h</span></div>
                            <div>Sky: <span>${info.sky || 'N/A'}</span></div>
                        </div>
                        <div class="prob-box ${probClass}">
                            ${probText}: ${prob}%
                        </div>
                        <div class="updated">Updated: ${info.updated}</div>
                    `;
                    grid.appendChild(card);
                }
            } catch (e) {
                console.error("Radar sync error", e);
            }
        }
        setInterval(updateRadar, 30000);
        window.onload = updateRadar;
    </script>
</head>
<body>
    <div class="container">
        <h1>🌀 Вумбыч Probability Radar</h1>
        <div id="radar-grid" class="grid">
            <div style="text-align: center; grid-column: 1/-1;">Synchronizing with weather satellites...</div>
        </div>
    </div>
</body>
</html>
